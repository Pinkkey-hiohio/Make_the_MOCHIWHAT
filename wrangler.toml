# ========================================
# 合成大MOCHI — Cloudflare 配置
# ========================================
name = "make-the-mochi"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

# ---- D1 数据库 ----
# 部署前需在 Cloudflare Dashboard 创建 D1 数据库
# 然后将 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "mochi-db"
database_id = ""

# ---- 环境变量（可选） ----
[vars]
LEADERBOARD_MAX_ENTRIES = "100"
